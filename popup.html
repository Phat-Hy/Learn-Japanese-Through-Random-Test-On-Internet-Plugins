<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Learn Japanese through Context</title>
  <link rel="stylesheet" href="content.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0f172a;
      width: 600px;
      font-family: 'Outfit', 'Noto Sans JP', sans-serif;
      overflow-x: hidden;
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    body.expanded {
      width: 900px;
    }
    
    .popup-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px;
    }
    
    .logo {
      width: 28px;
      height: 28px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #f8fafc;
      margin: 0;
    }
    
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    textarea {
      width: 100%;
      height: 80px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s ease;
    }
    
    textarea:focus {
      border-color: #ef4444;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.3);
    }
    
    button.analyze-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: #ef4444;
      border: none;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    button.analyze-btn:hover {
      background: #dc2626;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
    }
    
    /* Layout styling inside popup */
    .popup-container {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    
    .glass-card {
      width: 100% !important;
      max-height: 760px;
      margin: 0;
      border: none;
      background: transparent;
      padding: 0;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    
    .side-drawer {
      width: 288px;
      max-height: 760px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.6);
      box-shadow: none;
      display: none;
    }
    
    .side-drawer.visible {
      display: flex;
    }
    
    .footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .settings-link {
      font-size: 12px;
      color: #94a3b8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    
    .settings-link:hover {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="popup-wrapper">
    <!-- Header -->
    <div class="header">
      <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" fill="#ef4444" />
        <path d="M50 25 L50 40 M30 45 L70 45 M50 45 L50 75 M35 60 L65 60" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
      </svg>
      <h1 class="title">Learn Japanese through Context</h1>
    </div>

    <!-- Input Section -->
    <div class="input-section" id="input-container">
      <textarea id="japanese-input" placeholder="Type or paste Japanese text here..."></textarea>
      <button class="analyze-btn" id="analyze-button">
        <span>Analyze Text</span>
      </button>
    </div>

    <!-- Analysis Display Section -->
    <div class="popup-container" id="analysis-container" style="display: none;">
      <div id="card-holder" style="flex: 1;">
        <!-- Glass Card renders here -->
      </div>
      <div class="side-drawer" id="popup-drawer">
        <!-- Alternative Definitions Drawer renders here -->
      </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <a class="settings-link" id="open-settings">
        <svg style="width:14px; height:14px; fill:currentColor;" viewBox="0 0 24 24">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
        <span>Settings</span>
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
