<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Options - Learn Japanese through Context</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #f8fafc;
      font-family: 'Outfit', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    .container {
      width: 480px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }
    
    .logo {
      width: 36px;
      height: 36px;
    }
    
    .title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }
    
    .section {
      margin-bottom: 24px;
    }
    
    .section-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #94a3b8;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .setting-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }
    
    .setting-item input[type="checkbox"],
    .setting-item input[type="radio"] {
      margin-top: 3px;
      cursor: pointer;
      accent-color: #ef4444;
    }
    
    .setting-label-group {
      display: flex;
      flex-direction: column;
    }
    
    .setting-label {
      font-size: 14px;
      font-weight: 500;
      color: #f8fafc;
    }
    
    .setting-desc {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }
    
    button {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    
    button.primary {
      background: #ef4444;
      border: none;
      color: #ffffff;
      flex: 1;
    }
    
    button.primary:hover {
      background: #dc2626;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
    }
    
    button.secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
    }
    
    button.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #f8fafc;
    }
    
    .status-msg {
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      height: 18px;
      color: #10b981;
      font-weight: 500;
      transition: opacity 0.2s ease;
      opacity: 0;
    }
    
    .cache-info {
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 10px 14px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" fill="#ef4444" />
        <path d="M50 25 L50 40 M30 45 L70 45 M50 45 L50 75 M35 60 L65 60" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
      </svg>
      <h1 class="title">Extension Options</h1>
    </div>

    <!-- Section 1: Activation Settings -->
    <div class="section">
      <div class="section-title">Activation Mode</div>
      <div class="setting-group">
        <label class="setting-item">
          <input type="radio" name="triggerMode" id="mode-click" checked>
          <div class="setting-label-group">
            <span class="setting-label">Click Floating Button</span>
            <span class="setting-desc">Shows a small button near selected text; click it to open the analysis card.</span>
          </div>
        </label>
        
        <label class="setting-item">
          <input type="radio" name="triggerMode" id="mode-auto">
          <div class="setting-label-group">
            <span class="setting-label">Auto-Translate on Selection</span>
            <span class="setting-desc">Instantly opens the analysis card whenever Japanese text is selected.</span>
          </div>
        </label>
      </div>
    </div>

    <!-- Section 2: Display Settings -->
    <div class="section">
      <div class="section-title">Display Settings</div>
      <div class="setting-group">
        <label class="setting-item">
          <input type="checkbox" id="show-romaji" checked>
          <div class="setting-label-group">
            <span class="setting-label">Show Romaji pronunciation</span>
            <span class="setting-desc">Display the sentence-level Latin reading below the Japanese text.</span>
          </div>
        </label>
      </div>
    </div>

    <!-- Section 3: Data & Cache -->
    <div class="section">
      <div class="section-title">Local Dictionary Database Cache</div>
      <div class="cache-info">
        <span id="cache-count">Loading cache information...</span>
        <button class="secondary" id="clear-cache" style="padding: 6px 12px; font-size: 11px;">Clear Cache</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="btn-group">
      <button class="primary" id="save-button">Save Settings</button>
    </div>
    
    <div class="status-msg" id="status">Settings saved successfully!</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
