<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </radialGradient>
  </defs>
  <!-- Slate Background -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)" />
  
  <!-- Red Sun (Japan) -->
  <circle cx="64" cy="64" r="38" fill="url(#sunGrad)" />
  
  <!-- Stylized Kanji '学' (Gaku / Study) in White -->
  <g fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top three strokes (dots/dashes) -->
    <path d="M42 35 L48 42" />
    <path d="M64 30 L64 39" />
    <path d="M86 35 L80 42" />
    
    <!-- Crown element (roof-like) -->
    <path d="M36 48 L46 54 L82 54 L92 48" />
    
    <!-- Child/Son element (子) -->
    <!-- Horizontal top line -->
    <path d="M48 68 L80 68" />
    <!-- Vertical curves down and hook -->
    <path d="M64 54 C64 74 61 86 52 94" />
    <path d="M52 94 C60 94 68 94 74 94 C80 94 80 88 80 84" />
    <!-- Crossbar -->
    <path d="M40 78 L88 78" />
  </g>
</svg>
